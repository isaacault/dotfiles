# External plugins pulled on apply — replaces the git submodules the old
# isaacault/tmux and isaacault/zsh repos used.
#
# PINNED for reproducibility: each is a versioned archive (a tag or an exact
# commit), so every machine gets byte-identical plugins regardless of when it
# was set up. To upgrade a plugin, bump its URL to a newer tag/commit in one
# reviewable commit — never a silent drift. (Previously these were git-repo
# externals tracking each default branch's HEAD, which let machines diverge.)

# tmux plugins (TPM expects them under ~/.config/tmux/plugins/;
# catppuccin/tmux deliberately lands as "tmux" — that's the name TPM uses)
[".config/tmux/plugins/tpm"]
    type = "archive"
    url = "https://github.com/tmux-plugins/tpm/archive/e261deb1b47614eed3400089ce7197dc68acc4eb.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".config/tmux/plugins/tmux"]
    type = "archive"
    url = "https://github.com/catppuccin/tmux/archive/refs/tags/v2.3.0.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".config/tmux/plugins/tmux-resurrect"]
    type = "archive"
    url = "https://github.com/tmux-plugins/tmux-resurrect/archive/cff343cf9e81983d3da0c8562b01616f12e8d548.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".config/tmux/plugins/tmux-continuum"]
    type = "archive"
    url = "https://github.com/tmux-plugins/tmux-continuum/archive/0698e8f4b17d6454c71bf5212895ec055c578da0.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

# zsh plugins (ZDOTDIR = ~/.config/zsh)
[".config/zsh/plugins/zsh-completions"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-completions/archive/03bae0bf3f9c4ab894f1f11a31ffe7a1e1029879.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".config/zsh/plugins/zsh-syntax-highlighting"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting/archive/1d85c692615a25fe2293bdd44b34c217d5d2bf04.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".config/zsh/plugins/pure"]
    type = "archive"
    url = "https://github.com/sindresorhus/pure/archive/d0f35c270bad6d3df57f8da3f8d02e5465fb9b3d.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"
