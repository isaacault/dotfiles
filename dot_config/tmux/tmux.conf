# set-option -g default-shell /usr/bin/zsh

set-option -g default-terminal "tmux-256color"
set -sa terminal-features ",*:RGB"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf"
set -g base-index 1

set -g history-limit 50000

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r m resize-pane -Z

# Claude CLI Settings
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# list of tmux plugins
set -g @plugin 'catppuccin/tmux#latest' # See https://github.com/catppuccin/tmux/tags for additional tags

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @catppuccin_flavor 'mocha' # latte,frappe, macchiato or mocha
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Status bar: right side shows the current process + session name via
# catppuccin's modules (windows are styled by catppuccin's defaults). Without
# these lines catppuccin only recolours tmux's default bar (host + clock).
set -g status-left ""
set -g status-left-length 100
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Window entries: show just the index, not the pane title (which defaults to
# the hostname). Emptying catppuccin's window text leaves only the number.
set -g @catppuccin_window_text ""
set -g @catppuccin_window_current_text ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.config/tmux/plugins/tpm/tpm'
